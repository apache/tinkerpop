#
# Hadoop/Spark properties for TinkerPop docs builds.
# No Hadoop daemons are required -- all I/O uses the local filesystem
# via fs.defaultFS=file:/// (see core-site.xml in this directory).
#

# Disable distributed cache since we run locally with all jars on the classpath.
gremlin.hadoop.jarsInDistributedCache=false
