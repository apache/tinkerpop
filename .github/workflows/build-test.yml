name: build-test
on: [push, pull_request]
env:
  # modules commonly excluded from builds as they have their own independent non-JVM setups and can be run in parallel.
  # take care when modifying this list because GLVs use shell commands to remove themselves from this list and
  # modifications could break patterns of replacement they are searching for.
  EXCLUDE_MODULES: '-:gremlin-dotnet-source,-:gremlin-dotnet-tests,-:gremlin-go,-:gremlin-javascript,-:gremlint,-:gremlin-mcp,-:gremlin-python'
  EXCLUDE_FOR_GLV: '-:gremlin-archetype,-:gremlin-console,-:gremlin-coverage,-:hadoop-gremlin,-:neo4j-gremlin,-:spark-gremlin,-:sparql-gremlin'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  smoke:
    name: smoke
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean install -DskipTests -Dci --batch-mode -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
  java-jdk17:
    name: mvn clean install - jdk17
    timeout-minutes: 45
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean install -pl $EXCLUDE_MODULES -Dci --batch-mode -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
  java-jdk21:
    name: mvn clean install - jdk21
    timeout-minutes: 45
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      # spark-gremlin is excluded because Spark 3.3.x does not run on Java 21: its off-heap Platform initializer
      # reflects on the private DirectByteBuffer(long, int) constructor that JDK 21 removed. Java 21 support arrived
      # in Spark 4.0 (SPARK-43831), which requires Java 17+ and Scala 2.13, so the 3.8 line cannot adopt it.
      - name: Build with Maven
        run: mvn clean install -pl $EXCLUDE_MODULES,-:spark-gremlin -Dci --batch-mode -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
  java-jdk25:
    name: mvn clean install - jdk25
    timeout-minutes: 45
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      # spark-gremlin is excluded because no Spark release TinkerPop can adopt yet supports Java 25 (Spark 4.x, which
      # adds Java 25 support, requires Java 17+ and Scala 2.13). hadoop-gremlin runs on Java 25 as of Hadoop 3.4.3.
      - name: Build with Maven
        run: mvn clean install -pl $EXCLUDE_MODULES,-:spark-gremlin -Dci --batch-mode -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
  java-jdk11:
    name: mvn clean install - jdk11
    timeout-minutes: 45
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean install -pl $EXCLUDE_MODULES -Dci --batch-mode -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn -Dcoverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
         directory: ./gremlin-tools/gremlin-coverage/target/site
  gremlin-server-default:
    name: gremlin-server default
    timeout-minutes: 45
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          mvn clean install -pl $EXCLUDE_MODULES -q -DskipTests -Dci
          mvn verify -pl :gremlin-server -DskipTests -DskipIntegrationTests=false -DincludeNeo4j
  gremlin-server-unified:
    name: gremlin-server unified
    timeout-minutes: 45
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          mvn clean install -pl $EXCLUDE_MODULES -q -DskipTests -Dci
          mvn verify -pl :gremlin-server -DskipTests -DskipIntegrationTests=false -DincludeNeo4j -DtestUnified=true
  cache-gremlin-server-docker-image:
      name: cache gremlin-server docker image
      timeout-minutes: 10
      needs: smoke
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v7
        - name: Set up JDK 11
          uses: actions/setup-java@v5
          with:
            java-version: '11'
            distribution: 'temurin'
        - name: Generate Gremlin Server Base
          working-directory: .
          run: |
            mvn clean install -pl gremlin-server -DskipTests -DskipIntegrationTests=true -Dci -am
        - name: Save Docker image
          working-directory: ./gremlin-server
          run: docker save --output gremlin-server.tar tinkerpop/gremlin-server
        - uses: actions/cache@v6
          id: gremlin-server-test-docker-image
          with:
            path: |
              ./gremlin-server/*
              ~/.m2/repository/org/apache/tinkerpop/*
            key: ${{ github.sha }}
         # Disabled until Linux containers are supported on Windows runners: https://github.com/actions/virtual-environments/issues/252
#        - name: Upload Docker image for Windows
#          uses: actions/upload-artifact@v3
#          with:
#            name: ${{ github.sha }}
#            path: ./gremlin-server/gremlin-server.tar
#            retention-days: 1
# the hadoop-standard build runs really slowly in GHA for some reason. the command below runs in 10 minutes
# locally so not sure what's the issue is. at least hadoop-feature seems to happily run, so perhaps that is
# enough for now
#  hadoop-standard:
#    name: hadoop standard
#    timeout-minutes: 45
#    needs: smoke
#    runs-on: ubuntu-latest
#    steps:
#      - uses: actions/checkout@v7
#      - name: Set up JDK 11
#        uses: actions/setup-java@v5
#        with:
#          java-version: '11'
#          distribution: 'temurin'
#      - name: Build with Maven
#        run: |
#          mvn clean install -pl $EXCLUDE_MODULES -q -DskipTests -Dci
#          mvn verify -pl :hadoop-gremlin -DskipTests -DskipIntegrationTests=false '-Dit.test=HadoopGraphProcessStandardIntegrateTest'
  hadoop-feature:
    name: hadoop feature
    timeout-minutes: 45
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          mvn clean install -pl $EXCLUDE_MODULES -q -DskipTests -Dci
          mvn verify -pl :hadoop-gremlin -DskipTests -DskipIntegrationTests=false '-Dit.test=HadoopGraphFeatureIntegrateTest'
  spark-core:
    name: spark core
    timeout-minutes: 45
    needs: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven Windows
        if: runner.os == 'Windows'
        run: |
          mvn clean install -pl %EXCLUDE_MODULES% -q -DskipTests -DskipImageBuild -Dci
      - name: Build with Maven Ubuntu
        if: runner.os == 'Linux'
        run: |
          mvn clean install -pl $EXCLUDE_MODULES -q -DskipTests -Dci
          mvn verify -pl :spark-gremlin -DskipTests -DskipIntegrationTests=false '-Dit.test=*IntegrateTest,!SparkGryoSerializerGraphComputerProcessIntegrateTest'
  spark-gryo:
    name: spark gryo
    timeout-minutes: 45
    needs: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven Windows
        if: runner.os == 'Windows'
        run: |
          mvn clean install -pl %EXCLUDE_MODULES% -q -DskipTests -DskipImageBuild -Dci
      - name: Build with Maven Ubuntu
        if: runner.os == 'Linux'
        run: |
          mvn clean install -pl $EXCLUDE_MODULES -q -DskipTests -Dci
          mvn verify -pl :spark-gremlin -DskipTests -DskipIntegrationTests=false -Dit.test=SparkGryoSerializerGraphComputerProcessIntegrateTest
  gremlin-console:
    name: gremlin-console
    timeout-minutes: 20
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          touch gremlin-python/.glv
          mvn clean install -pl $EXCLUDE_MODULES -q -DskipTests -Dci
          mvn verify -pl :gremlin-console -DskipTests -DskipIntegrationTests=false
  gremlin-driver:
    name: gremlin-driver
    timeout-minutes: 20
    needs: cache-gremlin-server-docker-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          mvn clean install -pl $EXCLUDE_MODULES -q -DskipTests -Dci
          mvn verify -pl gremlin-driver -DskipIntegrationTests=false
  javascript:
    name: javascript-glv-node${{ matrix.node-version }}
    timeout-minutes: 15
    needs: cache-gremlin-server-docker-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [ '20', '22', '24', '26' ]
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Get Cached Server Base Image
        uses: actions/cache@v6
        id: gremlin-server-test-docker-image
        with:
          path: |
            ./gremlin-server/*
            ~/.m2/repository/org/apache/tinkerpop/*
          key: ${{ github.sha }}
      - name: Load Docker Image
        working-directory: ./gremlin-server
        run: docker load --input gremlin-server.tar
      - name: Build with Maven
        run: |
          EXCLUDE="-:gremlin-dotnet-source,-:gremlin-dotnet-tests,-:gremlin-go,-:gremlin-python,$EXCLUDE_FOR_GLV"
          mvn clean install -pl $EXCLUDE -q -DskipTests -Dci
          mvn verify -pl :gremlin-javascript,:gremlint,:gremlin-mcp -Dnode.test.version=${{ matrix.node-version }}
  python:
    name: python-${{ matrix.python-version }}
    timeout-minutes: 20
    needs: cache-gremlin-server-docker-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    env:
      PYTHON_VERSION: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build with Maven
        run: |
          touch gremlin-python/.glv
          EXCLUDE="${EXCLUDE_MODULES/,-:gremlin-python},$EXCLUDE_FOR_GLV"
          mvn clean install -pl $EXCLUDE -q -DskipTests -Dci
          mvn verify -pl gremlin-python
  dotnet:
    name: .NET
    timeout-minutes: 20
    needs: cache-gremlin-server-docker-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Set up .NET 8.0.x
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '8.0.x'
      - name: Get Cached Server Base Image
        uses: actions/cache@v6
        id: gremlin-server-test-docker-image
        with:
          path: |
            ./gremlin-server/*
            ~/.m2/repository/org/apache/tinkerpop/*
          key: ${{ github.sha }}
      - name: Load Docker Image
        working-directory: ./gremlin-server
        run: docker load --input gremlin-server.tar
      - name: Build with Maven
        run: |
          touch gremlin-dotnet/src/.glv
          touch gremlin-dotnet/test/.glv
          EXCLUDE="${EXCLUDE_MODULES/-:gremlin-dotnet-source,-:gremlin-dotnet-tests,},$EXCLUDE_FOR_GLV"
          mvn clean install -pl $EXCLUDE -q -DskipTests -Dci
          mvn verify -pl :gremlin-dotnet,:gremlin-dotnet-tests -P gremlin-dotnet
  neo4j-gremlin:
    name: neo4j-gremlin
    timeout-minutes: 20
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven
        run: |
          mvn clean install -pl $EXCLUDE_MODULES -q -DskipTests -Dci
          mvn verify -pl :neo4j-gremlin -DincludeNeo4j
  go:
    name: go
    timeout-minutes: 20
    needs: cache-gremlin-server-docker-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25'
      - name: Get Cached Server Base Image
        uses: actions/cache@v6
        id: gremlin-server-test-docker-image
        with:
          path: |
            ./gremlin-server/*
            ~/.m2/repository/org/apache/tinkerpop/*
          key: ${{ github.sha }}
      - name: Load Docker Image
        working-directory: ./gremlin-server
        run: docker load --input gremlin-server.tar
      - name: Build with Maven
        working-directory: .
        run: |
          touch gremlin-go/.glv
          EXCLUDE="${EXCLUDE_MODULES/-:gremlin-go,},$EXCLUDE_FOR_GLV"
          mvn clean install -pl $EXCLUDE -q -DskipTests -Dci
          mvn verify -pl :gremlin-go
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          working-directory: ./gremlin-go
      - name: Go-Vet
        working-directory: ./gremlin-go
        run: go vet ./...
